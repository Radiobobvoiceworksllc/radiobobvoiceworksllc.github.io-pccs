<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ========================== -->
  <!-- 🧠 META + PAGE SETUP -->
  <!-- ========================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulletin - PCCS</title>

  <!-- 🎨 MAIN STYLES -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ========================== -->
<!-- 🏫 HEADER / NAVIGATION -->
<!-- ========================== -->
<header class="main-header">
  <div class="header-container">

    <!-- 🔷 LOGO + SCHOOL NAME -->
    <div class="logo-area">
      <img src="images/logo.png" alt="PCCS Logo">
      <h1>Polk County Christian School</h1>
    </div>

    <!-- 🔗 NAVIGATION LINKS -->
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="academics.html">Academics</a>
      <a href="athletics.html">Athletics</a>
      <a href="bulletin.html">Bulletin</a>
      <a href="livestream.html">Livestream</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

<!-- ========================== -->
<!-- 🎛️ FILTER CONTROLS -->
<!-- ========================== -->
<section class="bulletin-filters">

  <h3>Filter Bulletin</h3>

  <!-- 🔄 RESET / BACK BUTTON -->
  <div class="filter-reset">
    <button onclick="setFilter()">← Back to All</button>
  </div>

  <!-- 🏫 SCHOOL FILTER -->
  <div class="filter-group">
    <strong>School</strong>
    <button onclick="setFilter()">All School</button>
  </div>

  <!-- 🏀 ATHLETICS FILTER -->
  <div class="filter-group">
    <strong>Athletics</strong>
    <button onclick="setFilter('athletics')">All Athletics</button>
    <button onclick="setFilter('athletics','ms-boys-basketball')">MS Boys Basketball</button>
    <button onclick="setFilter('athletics','ms-girls-volleyball')">MS Girls Volleyball</button>
  </div>

  <!-- 📚 ACADEMICS FILTER -->
  <div class="filter-group">
    <strong>Academics</strong>
    <button onclick="setFilter('3rd-grade')">3rd Grade</button>
    <button onclick="setFilter('kindergarten')">Kindergarten</button>
  </div>

</section>

<!-- ========================== -->
<!-- 📢 BULLETIN SECTION -->
<!-- ========================== -->
<section class="bulletin">

  <!-- 📰 SECTION TITLE -->
  <h2>School Bulletin</h2>

  <!-- ========================== -->
  <!-- 📅 SORT CONTROL -->
  <!-- ========================== -->
  <div class="bulletin-controls">
    <button id="sort-button" onclick="toggleSort()">
      Sort: Newest First
    </button>
  </div>

  <!-- ========================== -->
  <!-- 🔎 CURRENT FILTER DISPLAY -->
  <!-- ========================== -->
  <div id="currentFilter" class="current-filter"></div>

  <!-- ========================== -->
  <!-- 📋 BULLETIN LIST (JS RENDERS HERE) -->
  <!-- ========================== -->
  <div id="bulletinList"></div>

</section>

<!-- ========================== -->
<!-- 📎 FOOTER -->
<!-- ========================== -->
<footer class="main-footer">
  <p>© Polk County Christian School</p>
  <p>2490 W. Tower Dr, Bolivar, MO</p>
  <p>Email: info@pccs.org | Phone: (417) 777-2330</p>
</footer>

<!-- ========================== -->
<!-- 📜 BULLETIN SCRIPT -->
<!-- ========================== -->
<script src="bulletin.js"></script>

</body>
</html>
